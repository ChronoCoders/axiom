name: fuzz

on:
  workflow_dispatch:

jobs:
  cargo-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - run: cargo fuzz run network_message -- -max_total_time=30
      - run: cargo fuzz run transaction_json -- -max_total_time=30
