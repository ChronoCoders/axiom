<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AXIOM &bull; Validators</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="page-enter">
  <header class="topbar">
    <div class="brand">AXIOM <span class="pulse-dot" id="livePulse" title="Chain active"></span></div>
    <nav class="nav">
      <a href="index.html">Overview</a>
      <a href="blocks.html">Blocks</a>
      <a href="accounts.html">Accounts</a>
      <a href="validators.html" class="active">Validators</a>
    </nav>
    <div class="search-wrapper">
      <input type="text" id="globalSearch" class="search-input" placeholder="Search block height, hash, or account..." />
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="meta"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div id="toastContainer" class="toast-container"></div>

  <main class="container">
    <section class="section">
      <h2 class="section-title">Validator Set</h2>
      <div class="grid" style="margin-bottom:16px;">
        <div><label>Total Validators</label><span class="value mono" id="valCount"><span class="skeleton sk-sm"></span></span></div>
        <div><label>Active</label><span class="value mono" id="valActive"><span class="skeleton sk-sm"></span></span></div>
        <div><label>Total Voting Power</label><span class="value mono" id="valTotalPower"><span class="skeleton sk-sm"></span></span></div>
        <div><label>Quorum Required</label><span class="value mono" id="valQuorum"><span class="skeleton"></span></span></div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Validator ID</th>
              <th>Power</th>
              <th>Account</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="validatorsFullTable"></tbody>
        </table>
      </div>
      <div id="validatorsError" class="text-muted" style="margin-top:12px;"></div>
    </section>
  </main>

  <footer class="footer">AXIOM Console &middot; Read-only</footer>
  <div class="tooltip" id="tooltip"></div>
  <script src="app.js"></script>
</body>
</html>
