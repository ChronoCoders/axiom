<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AXIOM &bull; Accounts</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="page-enter">
  <header class="topbar">
    <div class="brand">AXIOM <span class="pulse-dot" id="livePulse" title="Chain active"></span></div>
    <nav class="nav">
      <a href="index.html">Overview</a>
      <a href="blocks.html">Blocks</a>
      <a href="accounts.html" class="active">Accounts</a>
      <a href="validators.html">Validators</a>
    </nav>
    <div class="search-wrapper">
      <input type="text" id="globalSearch" class="search-input" placeholder="Search block height, hash, or account..." />
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="meta"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div id="toastContainer" class="toast-container"></div>

  <main class="container">
    <section class="section">
      <h2 class="section-title">Account Lookup</h2>
      <div class="grid">
        <div>
          <label>Account ID</label>
          <input id="accountInput" type="text" placeholder="hex-encoded public key"/>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="lookupBtn">Lookup</button>
        </div>
      </div>
      <div id="accountError" class="text-muted" style="margin-top:12px;"></div>
    </section>

    <section class="section" id="accountResult" style="display:none;">
      <h2 class="section-title">Account</h2>
      <div class="grid">
        <div><label>Account ID</label><span class="value mono truncate" id="accId">-</span></div>
        <div><label>Balance</label><span class="value mono" id="accBalance">-</span><span class="unit">AXM</span></div>
        <div><label>Nonce</label><span class="value mono" id="accNonce">-</span></div>
      </div>
    </section>
  </main>

  <footer class="footer">AXIOM Console &middot; Read-only</footer>
  <div class="tooltip" id="tooltip"></div>
  <script src="app.js"></script>
</body>
</html>
