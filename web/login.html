<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AXIOM &bull; Sign In</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="login-shell">
  <div class="login-box">

    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2L3 6.5v7L10 18l7-4.5v-7L10 2zm0 2.24L15.2 7.5v5L10 15.76 4.8 12.5v-5L10 4.24z"/>
        </svg>
      </div>
      <div class="login-wordmark">
        AXIOM
        <span>Operator Console</span>
      </div>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>
      <p>Restricted access. Authorized operators only.</p>

      <div class="login-fields">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" id="username" placeholder="username" autocomplete="off" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="password" placeholder="password" autocomplete="off" required/>
        </div>
      </div>

      <button class="login-btn" id="loginBtn">
        Sign in
      </button>

      <div class="login-error" id="loginError"></div>
    </div>

  </div>
</div>

<script>
  if (localStorage.getItem("axiom_token")) {
    window.location.href = "index.html";
  }

  document.getElementById("loginBtn").addEventListener("click", doLogin);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Enter") doLogin();
  });

  function doLogin() {
    var user    = (document.getElementById("username").value || "").trim();
    var pass    = document.getElementById("password").value || "";
    var errEl   = document.getElementById("loginError");
    var btn     = document.getElementById("loginBtn");
    errEl.textContent = "";

    if (!user || !pass) {
      errEl.textContent = "Username and password required.";
      return;
    }

    btn.textContent = "Signing in...";
    btn.disabled    = true;

    fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass })
    }).then(function (res) {
      return res.json().then(function (data) {
        if (res.ok && data.token) {
          localStorage.setItem("axiom_token", data.token);
          window.location.href = "index.html";
        } else {
          errEl.textContent = data.error || "Access denied.";
          btn.textContent   = "Sign in";
          btn.disabled      = false;
        }
      });
    }).catch(function () {
      errEl.textContent = "Connection failed.";
      btn.textContent   = "Sign in";
      btn.disabled      = false;
    });
  }
</script>
</body>
</html>
